version: '3.8'

services:
  soul-codex:
    build: .
    container_name: soul-codex-prod
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
