# Render Blueprint - One-Click Deploy
# https://render.com/docs/blueprint-spec
# Deploy: Connect GitHub repo at render.com → New Blueprint Instance
services:
  - type: web
    name: soul-codex
    runtime: node
    region: oregon
    
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production npm start
    
    healthCheckPath: /health
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: soulcodex-db
          property: connectionString
      # Add in Render dashboard: SESSION_SECRET, ADMIN_PASSWORD
      # Optional: OPENAI_API_KEY, STRIPE_*, VAPID_*

databases:
  - name: soulcodex-db
    plan: free
    databaseName: soulcodex
    user: soulcodex
