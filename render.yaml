# Render Blueprint — Soul Codex
# https://render.com/docs/blueprint-spec
#
# Single service: Express API + Next.js static frontend served together.
# The Express server builds the Next.js export and serves it as static files.
#
# Deploy: Connect GitHub repo at render.com → New Blueprint Instance

services:
  - type: web
    name: soul-codex
    runtime: node
    region: oregon

    # Build both the Next.js static export and the Express bundle
    buildCommand: npm install && npm run build:next && npm run build
    # Express server serves the API and the Next.js static files
    startCommand: npm start

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
